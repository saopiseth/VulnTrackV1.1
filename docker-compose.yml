# Usage:
#   Local:    ENV_FILE=.env.docker    docker compose up -d --build
#   Internal: ENV_FILE=.env.internal  docker compose up -d --build

services:

  # ── PHP-FPM + Queue Worker + Scheduler (via Supervisor) ──────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vulntrack_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    env_file:
      - ${ENV_FILE:-.env.docker}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vulntrack

  # ── Nginx (only container exposed to host) ────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vulntrack_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./storage/app/public:/var/www/storage/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - vulntrack
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MySQL (internal only — no host port mapping) ──────────────
  mysql:
    image: mysql:8.0
    container_name: vulntrack_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vulntrack}
      MYSQL_USER: ${DB_USERNAME:-vulntrack}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - dbdata_brandnew:/var/lib/mysql
    networks:
      - vulntrack
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis (internal only) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vulntrack_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redisdata:/data
    networks:
      - vulntrack
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redissecret} ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  vulntrack:
    driver: bridge

volumes:
  dbdata_brandnew:
  redisdata:
