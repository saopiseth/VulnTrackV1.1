[PHP]
post_max_size       = 64M
upload_max_filesize = 64M
max_execution_time  = 300
memory_limit        = 256M
date.timezone       = UTC

; Logging — send errors to stderr so Docker captures them
log_errors      = On
error_log       = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors  = Off

[Session]
session.gc_maxlifetime = 86400
